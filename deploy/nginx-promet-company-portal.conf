server {
    listen 80;
    server_name your-domain.ru www.your-domain.ru;

    root /var/www/promet-company;
    index index.html index.php;

    # Общая защита всего портала. Пароль не хранится в HTML/JS.
    auth_basic "PROMET internal portal";
    auth_basic_user_file /etc/nginx/.htpasswd-promet-company;

    # Базовые защитные заголовки.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Если используете counter.php из старого раздела, нужен PHP-FPM.
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(git|env|htpasswd) {
        deny all;
    }
}
